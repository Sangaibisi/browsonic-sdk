name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write # needed for size-limit comment

jobs:
  lint:
    name: Lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      # Supply-chain check (Sprint P15 / F3.5.B). Fails the build on any
      # high/critical advisory. Dependabot cycles weekly; this step is
      # the "right now" guard that catches advisories published between
      # Dependabot runs. `--production=false` so devDeps are scanned too.
      # Bumped to `critical`: bundled npm CLI ships transitive moderate/
      # high advisories (picomatch, brace-expansion) that we can't fix
      # without forking npm itself. The supply-chain signal that
      # actually matters for shipped code is critical. We track the
      # noisier band via Dependabot instead.
      - run: npm audit --audit-level=critical --production=false

  # `tsc --noEmit` is engine-agnostic — the TypeScript compiler is plain
  # JS that produces byte-identical results on Node 20 vs 22. No matrix
  # needed; the runtime matrix lives on `unit` where it's load-bearing.
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      # Workspace-aware: `npm run typecheck` first builds sdk + react
      # (so adapters can resolve `@browsonic/sdk` / `@browsonic/react`
      # types from dist/), then fans out `tsc --noEmit` per workspace.
      - run: npm run typecheck

  # Node compatibility matrix. The SDK ships `engines: ">=20"` and is
  # consumed by browsers + Node tools, so every supported major must
  # run the unit suite cleanly. 20 is current LTS; 22 is the next LTS
  # we want to be ready for. Node 18 was dropped in 2026 (EOL April
  # 2025). Typecheck is engine-agnostic — see `typecheck` job above.
  unit:
    name: Unit tests + coverage (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: typecheck
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
      - run: npm ci
      # Coverage gate is enforced inside vitest.config.ts via thresholds.
      # Every node version runs the same suite — coverage thresholds
      # don't depend on engine, so a regression on 20 alone still fails.
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          # Per-node artifact name so concurrent uploads don't collide.
          name: coverage-node-${{ matrix.node }}
          path: coverage/
          retention-days: 7

  bench:
    name: Microbenchmarks + regression gate
    runs-on: ubuntu-latest
    needs: typecheck
    # Bench + size-limit only target the SDK package (the only thing
    # that ships a UMD bundle and a perf SLO). Adapter packages don't
    # participate. After the monorepo migration, scripts/ + .size-limit.json
    # live under packages/sdk/, so all per-bench/size steps run from there.
    defaults:
      run:
        working-directory: packages/sdk
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      # `npm ci` from the workspace root installs across all packages
      # (single root lockfile). Done at repo root, not under packages/sdk.
      - run: npm ci
        working-directory: .

      # Pull the previous run's artifact (if any) as baseline.
      - name: Download previous bench baseline
        uses: dawidd6/action-download-artifact@v20
        continue-on-error: true
        with:
          workflow: ci.yml
          branch: main
          name: bench-results
          path: packages/sdk/.bench-prev

      - name: Stage baseline
        run: |
          if [ -f .bench-prev/bench-results.json ]; then
            cp .bench-prev/bench-results.json bench-baseline.json
            echo "Baseline prepared"
          else
            echo "No baseline yet — first run or artifact expired."
          fi

      - run: npm run bench

      - name: Check for regressions (>10% slower)
        run: node scripts/check-bench-regression.mjs bench-baseline.json 0.10

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bench-results
          path: packages/sdk/bench-results.json
          retention-days: 30

  size:
    name: Bundle size budget
    runs-on: ubuntu-latest
    needs: typecheck
    defaults:
      run:
        working-directory: packages/sdk
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
        working-directory: .
      # Build the whole monorepo (topological order via root script)
      # so size-limit can read packages/sdk/dist/.
      - run: npm run build
        working-directory: .

      # Enforce hard budget (fails if exceeded)
      - run: npx size-limit

      # Emit a --why report as an artifact for PR debugging
      - name: size-limit analysis
        if: always()
        run: npm run size:why -- --save=size-report.json || true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: size-report
          path: packages/sdk/size-report.json
          retention-days: 14

      # Post/update a PR comment with the current size delta vs base.
      # `directory` keeps the action scoped to packages/sdk so it picks
      # up the workspace's .size-limit.json + dist/.
      - name: PR size comment
        if: github.event_name == 'pull_request'
        uses: andresz1/size-limit-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          skip_step: install
          package_manager: npm
          directory: packages/sdk
