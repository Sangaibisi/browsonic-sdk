name: release

# semantic-release driven by Conventional Commits, run **per workspace**.
# Each package owns its own .releaserc.json + CHANGELOG + version,
# so every workspace decides independently whether a release is due
# based on commit messages since its own last tag.
#
# Required secrets:
#   GITHUB_TOKEN  — provided by Actions; needs `contents: write`
#                   + `issues: write` + `pull-requests: write` to update
#                   CHANGELOG, push the tag, and publish the GitHub Release.
#   NPM_TOKEN     — npmjs.org Automation token with publish rights to
#                   the @browsonic scope. Generate at npmjs.com →
#                   Access Tokens → Granular → "Publish".
#
# Branch policy (per package .releaserc.json):
#   main         → stable releases (npm dist-tag: latest)
#   next         → prereleases (npm dist-tag: next)
#   release/X.x  → LTS lines (e.g. release/2.x), patch-only

on:
  push:
    branches:
      - main
      - next
      - "release/*.x"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write # required for npm provenance (sigstore)

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: semantic-release (per workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          # semantic-release reads tag history to compute the next
          # version; shallow clones produce nonsense.
          fetch-depth: 0
          persist-credentials: true

      # semantic-release@24+ requires node ^22.14 || >=24.10. Bumping
      # release jobs to 22; CI matrix still tests 20 + 22 so the SDK
      # itself remains node-20-compatible for consumers.
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - run: npm ci

      - name: Build all packages
        run: npm run build

      # Supply-chain artefacts for the SDK package — attached to its
      # GitHub Release via @semantic-release/github plugin in
      # packages/sdk/.releaserc.json (M3 follow-up: wire these into
      # the SDK release config so they ride along with the published
      # GitHub Release).
      #
      # Run from the workspace root because the monorepo has a single
      # root package-lock.json (npm workspaces). cyclonedx-npm reads
      # ./package-lock.json + ./node_modules/ and otherwise errors out
      # with `No evidence: no package lock file nor npm shrinkwrap file`.
      # Output lands inside packages/sdk/ so the existing release plugin
      # config still picks it up unchanged.
      - name: Generate SBOM (sdk, CycloneDX)
        run: npx --yes @cyclonedx/cyclonedx-npm --output-format json --output-file packages/sdk/browsonic-sdk.cdx.json
        continue-on-error: true

      - name: Compute SDK UMD checksums
        working-directory: packages/sdk
        run: |
          set -e
          if [ -f dist/umd/browsonic.min.js ]; then
            sha256sum dist/umd/browsonic.min.js dist/umd/browsonic.js > browsonic-sdk.sha256sums || true
          fi

      - name: Run semantic-release (per workspace)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # `setup-node@v6` with `registry-url` writes ~/.npmrc as
          # `_authToken=${NODE_AUTH_TOKEN}`; semantic-release internally
          # calls `npm whoami` which reads that file. Without
          # NODE_AUTH_TOKEN the substitution is empty and the verify
          # step fails with E401.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # `--provenance` is enabled via each package's
          # publishConfig and requires id-token: write (declared above).
        # `--workspaces --if-present` walks every package that ships a
        # `semantic-release` script. Today: sdk + react. Each runs
        # against its own .releaserc.json and decides independently.
        run: npm run semantic-release --workspaces --if-present
