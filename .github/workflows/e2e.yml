name: E2E

# Playwright chromium against a built E2E IIFE bundle. Heavy job (~5
# min with browser bring-up), so it runs on main pushes + nightly +
# manual dispatch — NOT on every PR. The PR-blocking gates are unit,
# bench, size, lint, typecheck in ci.yml; e2e is the safety net that
# runs before a release would be cut.
#
# Monorepo note: e2e fixtures + Playwright config live in the SDK
# package only. Other packages (e.g. @browsonic/react) get their own
# demo apps under `packages/<name>/examples/`, those are NOT run in CI.

on:
  push:
    branches: [main]
  schedule:
    - cron: "23 3 * * *" # nightly 03:23 UTC
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright chromium (sdk)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci

      # Cache Playwright browsers across runs. Key on root lockfile
      # (workspaces produce one). A @playwright/test bump in the sdk
      # workspace changes the root lockfile → cache invalidates.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers (chromium only)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: packages/sdk
        run: npx playwright install --with-deps chromium

      # System deps (libnss3, fonts, libxkbcommon) don't live under
      # ~/.cache/ms-playwright — install separately on cache hit.
      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: packages/sdk
        run: npx playwright install-deps chromium

      - run: npm run build
      - name: Build E2E IIFE bundle
        working-directory: packages/sdk
        run: npm run build:e2e
      - name: Run Playwright tests
        working-directory: packages/sdk
        run: npx playwright test
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: |
            packages/sdk/playwright-report/
            packages/sdk/e2e-results/
          retention-days: 7
