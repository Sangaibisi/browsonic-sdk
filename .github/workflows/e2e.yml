name: E2E

# Playwright chromium against the built UMD bundle. Heavy job (~5 min
# with browser bring-up), so it runs on main pushes + nightly + manual
# dispatch — NOT on every PR. The PR-blocking gates are unit, bench,
# size, lint, typecheck in ci.yml; e2e is the safety net that runs
# before a release would be cut.

on:
  push:
    branches: [main]
  schedule:
    - cron: '23 3 * * *' # nightly 03:23 UTC
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright chromium
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run build:e2e
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            e2e-results/
          retention-days: 7
