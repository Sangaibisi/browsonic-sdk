name: security

# CodeQL SAST + TruffleHog + dependency review for the SDK.
# Customer browsers run this code, so SAST coverage matters more here
# than anywhere else: a stored-XSS sink in the SDK becomes an XSS sink
# on every site that ships it. CodeQL's `security-and-quality` query
# pack catches the bulk of taint flows; manual review still mandatory
# for new instrumentation paths.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '37 6 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  codeql:
    name: CodeQL (typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: typescript
          queries: security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:typescript'

  secret-scan:
    name: TruffleHog secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # Pin to commit SHA — `@main` floating refs were the entry vector
      # for the 2026-03 trivy-action attack. Dependabot bumps the SHA
      # via PR when TruffleHog cuts a new release.
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@17456f8c7d042d8c82c9a8ca9e937231f9f42e26 # v3.95.2
        with:
          # Only fail on results TruffleHog can actively verify as real
          # secrets (live token, valid signature, etc). `unknown` matches
          # patterns that *look like* secrets, which produces noise on
          # documentation, fixtures, and example config strings — not
          # the right gate for a public repo.
          extra_args: --results=verified

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
          comment-summary-in-pr: on-failure
