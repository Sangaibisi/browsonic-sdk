# Dependabot — supply-chain update automation.
# Sprint 10 landing: weekly security + monthly version updates.
#
# Groups minor + patch bumps into one PR per ecosystem per week so the
# default-branch CI churn stays bounded. Major bumps stay as individual
# PRs so we never auto-open a "upgrade typescript 5 → 6" PR alongside an
# unrelated security patch.

version: 2
updates:
  # --- npm (runtime + dev deps) ---
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    versioning-strategy: 'increase'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'npm'
    groups:
      safe-updates:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'

  # --- GitHub Actions workflows ---
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 3
    commit-message:
      prefix: 'chore(ci)'
    labels:
      - 'dependencies'
      - 'github-actions'
    groups:
      actions-major:
        update-types:
          - 'major'
      actions-minor-patch:
        update-types:
          - 'minor'
          - 'patch'
