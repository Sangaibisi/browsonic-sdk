name: Feature request
description: Suggest a new capability or change to the SDK.
labels: ['enhancement', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Before opening, consider whether this is best as a discussion. If you are not yet sure what you want, the Discussions tab is a better place to start.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user-facing pain. Avoid prescribing the solution here.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: What have you tried?
      description: Existing APIs, workarounds, or other libraries you have evaluated.

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API
      description: A short sketch of what the new or changed API might look like. Pseudocode is fine.
      render: typescript

  - type: textarea
    id: scope
    attributes:
      label: Scope and trade-offs
      description: Bundle size, browser support, privacy implications, configuration complexity. Be honest about the cost.

  - type: checkboxes
    id: checked
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and discussions and did not find a duplicate.
          required: true
        - label: This feature is general enough to belong in the SDK rather than a private fork.
          required: true
